<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>幸运转盘 · GameHub</title>
<link rel="stylesheet" href="design-system.css">
<style>
body{background:var(--surface-0);height:100dvh;display:flex;overflow:hidden}
a{color:var(--brand-light);text-decoration:none}

/* 布局 */
.layout{display:flex;flex:1;min-height:0}
.sidebar{width:320px;flex-shrink:0;border-right:1px solid var(--border-subtle);background:var(--surface-1);display:flex;flex-direction:column;overflow:hidden}
.sidebar-header{padding:var(--space-4) var(--space-5);border-bottom:1px solid var(--border-subtle);display:flex;align-items:center;justify-content:space-between}
.sidebar-title{font-family:var(--font-display);font-size:16px;font-weight:700}
.sidebar-count{font-size:11px;color:var(--text-tertiary)}
.option-list{flex:1;overflow-y:auto;padding:var(--space-3)}
.option-item{display:flex;align-items:center;gap:var(--space-2);padding:var(--space-2) var(--space-3);margin-bottom:4px;border-radius:var(--radius-md);background:var(--surface-2);border:1px solid var(--border-subtle);transition:all .15s}
.option-item:hover{border-color:var(--border-default)}
.option-color{width:14px;height:14px;border-radius:4px;flex-shrink:0}
.option-input{flex:1;border:none;background:transparent;color:var(--text-primary);font-family:var(--font-body);font-size:13px;outline:none;min-width:0}
.option-input:focus{color:var(--text-white)}
.option-del{width:24px;height:24px;border:none;background:transparent;color:var(--text-tertiary);cursor:pointer;border-radius:4px;font-size:14px;display:flex;align-items:center;justify-content:center;opacity:0;transition:all .15s}
.option-item:hover .option-del{opacity:1}
.option-del:hover{background:rgba(239,68,68,.1);color:var(--error)}
.add-option-btn{width:100%;padding:var(--space-2);border:1px dashed var(--border-accent);background:rgba(124,58,237,.04);color:var(--brand-light);border-radius:var(--radius-md);font-family:var(--font-body);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;margin-top:4px}
.add-option-btn:hover{background:rgba(124,58,237,.1);border-color:var(--brand)}

.sidebar-footer{padding:var(--space-3) var(--space-5);border-top:1px solid var(--border-subtle);display:flex;gap:var(--space-2)}
.sidebar-footer button{flex:1}

/* 主题选择器 */
.theme-row{display:flex;gap:6px;padding:var(--space-2) var(--space-5);overflow-x:auto}
.theme-dot{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .15s;flex-shrink:0}
.theme-dot:hover{transform:scale(1.15)}
.theme-dot.active{border-color:var(--text-white);box-shadow:0 0 8px rgba(255,255,255,.2)}

/* 主区域 */
.main-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden;padding:20px}
.main-bg{position:absolute;inset:0;pointer-events:none}
.main-bg-glow{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:min(600px,120vw);height:min(600px,120vw);border-radius:50%;background:radial-gradient(circle,rgba(124,58,237,.08) 0%,rgba(245,158,11,.04) 45%,transparent 70%);animation:pulseGlow 4s ease-in-out infinite}
.main-title{font-family:var(--font-display);font-size:clamp(22px,4vw,32px);font-weight:900;text-align:center;margin-bottom:4px;background:linear-gradient(135deg,#F5C842,#FDE68A,#F59E0B);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.main-sub{font-size:13px;color:var(--text-tertiary);text-align:center;margin-bottom:24px;font-family:var(--font-display)}
.wheel-container{width:min(360px,80vw);height:min(360px,80vw);position:relative;border-radius:50%;padding:8px;background:radial-gradient(circle at 45% 35%,#4B3878,#1E1240 55%,#0D0620);box-shadow:0 0 0 4px rgba(124,58,237,.18),0 0 80px rgba(124,58,237,.06),0 0 160px rgba(124,58,237,.02),inset 0 2px 0 rgba(255,255,255,.03);animation:wheelEnter .5s var(--ease-bounce) both}
.wheel-pointer{position:absolute;top:-14px;left:50%;transform:translateX(-50%);z-index:10;width:0;height:0;border-left:16px solid transparent;border-right:16px solid transparent;border-top:30px solid var(--gold);filter:drop-shadow(0 3px 8px rgba(0,0,0,.5))drop-shadow(0 0 12px rgba(245,200,66,.5));animation:ptrBounce .8s ease-in-out infinite}
.result-area{min-height:40px;margin-top:20px;text-align:center;font-family:var(--font-display);font-size:20px;font-weight:800;transition:all .3s var(--ease-bounce)}
.spin-btn{margin-top:12px;padding:16px 64px;border:none;border-radius:var(--radius-full);background:linear-gradient(180deg,#A855F7,#7C3AED 50%,#5B21B6);color:#fff;font-family:var(--font-display);font-size:18px;font-weight:700;letter-spacing:.04em;cursor:pointer;box-shadow:0 4px 28px rgba(124,58,237,.4),inset 0 1px 0 rgba(255,255,255,.1);transition:all .15s var(--ease-out);min-height:56px;position:relative;overflow:hidden;-webkit-tap-highlight-color:transparent}
.spin-btn:active{transform:scale(.95)}
.spin-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.spin-btn .shine{position:absolute;top:-60%;left:-70%;width:60%;height:220%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.06),transparent);transform:skewX(-20deg);animation:btnShine 3s ease-in-out infinite}

/* 弹窗 */
.modal-overlay{position:fixed;inset:0;z-index:1000;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.75);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.modal-overlay.show{display:flex}
.modal-card{background:linear-gradient(160deg,#1E1A3A,#12122A);border:1px solid rgba(245,200,66,.25);border-radius:24px;padding:36px 28px;text-align:center;max-width:340px;width:88vw;box-shadow:0 12px 60px rgba(0,0,0,.6),0 0 80px rgba(245,200,66,.08);transform:scale(.8);transition:transform .3s var(--ease-bounce)}
.modal-overlay.show .modal-card{transform:scale(1)}
.modal-icon{font-size:64px;margin-bottom:12px}
.modal-label{font-family:var(--font-display);font-size:14px;font-weight:600;color:var(--text-secondary);margin-bottom:4px}
.modal-prize{font-family:var(--font-display);font-size:26px;font-weight:900;margin-bottom:24px;background:linear-gradient(135deg,var(--gold),var(--gold-light));-webkit-background-clip:text;-webkit-text-fill-color:transparent}

/* 动画 */
@keyframes wheelEnter{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}
@keyframes ptrBounce{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(6px)}}
@keyframes pulseGlow{0%,100%{opacity:.5;transform:translate(-50%,-50%) scale(1)}50%{opacity:1;transform:translate(-50%,-50%) scale(1.1)}}
@keyframes btnShine{0%{left:-70%}60%{left:130%}100%{left:130%}}
@keyframes spinPulse{0%,100%{box-shadow:0 0 0 4px rgba(124,58,237,.18),0 0 80px rgba(124,58,237,.06) inset}50%{box-shadow:0 0 0 8px rgba(245,200,66,.12),0 0 120px rgba(245,200,66,.08)}}

@media(max-width:768px){
  .layout{flex-direction:column-reverse}
  .sidebar{width:100%;max-height:35dvh;border-right:none;border-top:1px solid var(--border-subtle)}
  .main-area{padding:12px}
  .wheel-container{width:min(280px,75vw);height:min(280px,75vw)}
  .spin-btn{padding:14px 48px;font-size:16px}
}
</style>
</head>
<body>

<div class="layout">
  <!-- 左侧: 选项编辑 -->
  <div class="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-title">选项列表</span>
      <span class="sidebar-count" id="optCount">6项</span>
    </div>
    <div class="theme-row" id="themeRow"></div>
    <div class="option-list" id="optionList"></div>
    <button class="add-option-btn" onclick="addOption()">+ 添加选项</button>
  </div>

  <!-- 右侧: 转盘 -->
  <div class="main-area">
    <div class="main-bg"><div class="main-bg-glow"></div></div>
    <div class="main-title">幸运转盘</div>
    <div class="main-sub">点击转盘或按钮开始抽选</div>
    <div class="wheel-container" id="wheelWrap">
      <div class="wheel-pointer"></div>
    </div>
    <div class="result-area" id="result"></div>
    <button class="spin-btn" id="spinBtn" onclick="doSpin()">
      开始抽选
      <div class="shine"></div>
    </button>
  </div>
</div>

<!-- 中奖弹窗 -->
<div class="modal-overlay" id="winModal">
  <div class="modal-card">
    <div class="modal-icon" id="winIcon">🎉</div>
    <div class="modal-label">抽选结果</div>
    <div class="modal-prize" id="winText"></div>
    <button class="btn btn-primary" onclick="closeModal();doSpin()" style="width:100%;margin-bottom:8px;font-size:15px">再抽一次</button>
    <button class="btn btn-ghost" onclick="closeModal()" style="width:100%;font-size:13px">关闭</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/spin-wheel@5/dist/spin-wheel-iife.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1/dist/confetti.browser.min.js"></script>
<script src="runtime/effects/sound.js"></script>
<script src="runtime/effects/juice.js"></script>
<script src="runtime/effects/kenney-audio.js"></script>

<script>
// ═══ 主题预设 ═══
var THEMES = [
  {name:'默认',colors:['#EF4444','#7C3AED','#22C55E','#F59E0B','#3B82F6','#EC4899','#F97316','#06B6D4','#84CC16','#6366F1','#E11D48','#8B5CF6']},
  {name:'暖色',colors:['#EF4444','#F97316','#F59E0B','#EAB308','#84CC16','#22C55E','#14B8A6','#EC4899','#E11D48','#DC2626','#EA580C','#CA8A04']},
  {name:'冷色',colors:['#3B82F6','#6366F1','#8B5CF6','#A855F7','#06B6D4','#0EA5E9','#2563EB','#7C3AED','#4F46E5','#0284C7','#0891B2','#4338CA']},
  {name:'糖果',colors:['#F472B6','#FB923C','#FBBF24','#A3E635','#34D399','#22D3EE','#818CF8','#C084FC','#FB7185','#FDA4AF','#FDE68A','#A7F3D0']},
  {name:'暗金',colors:['#B8860B','#DAA520','#F5C842','#8B6914','#CD853F','#D2691E','#A0522D','#BDB76B','#6B8E23','#808000','#556B2F','#8B4513']},
  {name:'霓虹',colors:['#FF0080','#7928CA','#00DFD8','#FF4D4D','#007CF0','#00FF88','#FFD700','#FF1493','#00BFFF','#7FFF00','#FF4500','#9400D3']},
];
var _currentTheme = 0;
var _options = [
  {title:'吃火锅',color:'#EF4444'},{title:'吃日料',color:'#7C3AED'},
  {title:'点外卖',color:'#22C55E'},{title:'自己做饭',color:'#F59E0B'},
  {title:'不吃减肥',color:'#3B82F6'},{title:'随便',color:'#EC4899'},
];
var _wheel = null, _spinning = false;

// ═══ 初始化 ═══
(function init(){
  buildThemeDots();
  renderOptions();
  buildWheel();
})();

function buildThemeDots(){
  var html='';
  for(var i=0;i<THEMES.length;i++){
    html+='<div class="theme-dot'+(i===_currentTheme?' active':'')+'" style="background:'+THEMES[i].colors[0]+'" onclick="switchTheme('+i+')" title="'+THEMES[i].name+'"></div>';
  }
  document.getElementById('themeRow').innerHTML=html;
}

function switchTheme(i){
  _currentTheme=i;
  buildThemeDots();
  // 给每个选项分配新主题色
  for(var j=0;j<_options.length;j++) _options[j].color=THEMES[i].colors[j%THEMES[i].colors.length];
  renderOptions();
  buildWheel();
}

// ═══ 选项管理 ═══
function renderOptions(){
  var html='';
  for(var i=0;i<_options.length;i++){
    var o=_options[i];
    html+='<div class="option-item">'+
      '<input type="color" class="option-color" value="'+o.color+'" onchange="updateOptionColor('+i+',this.value)" style="width:14px;height:14px;padding:0;border:none;cursor:pointer" title="颜色">'+
      '<input class="option-input" value="'+esc(o.title)+'" onchange="updateOption('+i+',this.value)" placeholder="输入选项">'+
      '<button class="option-del" onclick="removeOption('+i+')" title="删除">×</button></div>';
  }
  document.getElementById('optionList').innerHTML=html;
  document.getElementById('optCount').textContent=_options.length+'项';
}

function addOption(){
  var colors=THEMES[_currentTheme].colors;
  _options.push({title:'新选项',color:colors[_options.length%colors.length]});
  renderOptions();buildWheel();
}

function removeOption(i){
  if(_options.length<=2)return;
  _options.splice(i,1);
  renderOptions();buildWheel();
}

function updateOption(i,val){_options[i].title=val;}
function updateOptionColor(i,val){_options[i].color=val;buildWheel();}

// ═══ 转盘 ═══
function buildWheel(){
  if(_wheel){_wheel.remove();_wheel=null;}
  var wrap=document.getElementById('wheelWrap');
  var items=_options.map(function(o){return{label:o.title||'?',backgroundColor:o.color};});
  _wheel=new spinWheel.Wheel(wrap,{
    items:items,radius:.80,itemLabelRadius:.66,itemLabelRadiusMax:.32,
    itemLabelFontSizeMax:12,itemLabelColors:['#fff'],itemLabelStrokeColor:'rgba(0,0,0,.5)',
    itemLabelStrokeWidth:1.5,lineColor:'rgba(255,255,255,.12)',lineWidth:2,
    rotationSpeedMax:550,rotationResistance:-45,
    onRest:onWin,
    onSpin:function(){_spinning=true},
  });
}

function doSpin(){
  if(!_wheel||_spinning)return;
  document.getElementById('spinBtn').disabled=true;
  document.getElementById('spinBtn').textContent='转动中...';
  document.getElementById('result').textContent='';
  SoundFX.play('click');Juice.vibrate('light');
  if(typeof KenneyAudio!=='undefined')KenneyAudio.play('diceShuffle');
  _wheel.spin();
}

function onWin(e){
  _spinning=false;
  var prize=_options[e.currentIndex];if(!prize)prize={title:'?',color:'#7C3AED'};
  var btn=document.getElementById('spinBtn');btn.disabled=false;btn.textContent='再来一次';

  // 彩带
  if(typeof confetti!=='undefined'){
    confetti({particleCount:100,spread:70,origin:{y:.5},colors:['#F5C842','#EC4899','#7C3AED','#22C55E'],disableForReducedMotion:true});
  }

  // 音效
  if(typeof KenneyAudio!=='undefined'){KenneyAudio.play('chipsCollide');setTimeout(function(){KenneyAudio.play('diceThrow');},100);}
  else SoundFX.play('win');

  // 震动
  Juice.vibrate('medium');

  // 显示结果
  var r=document.getElementById('result');
  r.textContent='→ '+prize.title;
  r.style.color=prize.color;
  r.style.transform='scale(0)';r.style.opacity='0';
  requestAnimationFrame(function(){r.style.transform='scale(1)';r.style.opacity='1';});

  // 弹窗
  showModal(prize);
}

function showModal(prize){
  var m=document.getElementById('winModal');
  document.getElementById('winText').textContent=prize.title;
  m.classList.add('show');
}

function closeModal(){
  document.getElementById('winModal').classList.remove('show');
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
</script>
</body>
</html>
