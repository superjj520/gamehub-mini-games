<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>幸运转盘 · GameHub</title>
<link rel="stylesheet" href="design-system.css">
<style>
body{background:#050508;height:100dvh;display:flex;overflow:hidden}
a{color:var(--brand-light);text-decoration:none}

.layout{display:flex;flex:1;min-height:0}
/* 左侧面板 - 紫色调 */
.sidebar{width:380px;flex-shrink:0;border-right:1px solid rgba(124,58,237,.15);background:#0C0A18;display:flex;flex-direction:column;overflow:hidden}
.sidebar-head{padding:20px 24px;border-bottom:1px solid rgba(124,58,237,.12)}
.sidebar-title{font-family:var(--font-display);font-size:18px;font-weight:800;color:var(--text-primary)}
.sidebar-desc{font-size:12px;color:var(--text-tertiary);margin-top:2px}
.option-list{flex:1;overflow-y:auto;padding:12px 16px}
.option-row{display:flex;align-items:center;gap:10px;padding:10px 14px;margin-bottom:6px;border-radius:12px;background:rgba(124,58,237,.06);border:1px solid rgba(124,58,237,.08);transition:all .15s}
.option-row:hover{border-color:rgba(124,58,237,.2);background:rgba(124,58,237,.1)}
.option-dot{width:16px;height:16px;border-radius:50%;flex-shrink:0;cursor:pointer;border:2px solid rgba(255,255,255,.1);transition:all .15s}
.option-dot:hover{border-color:rgba(255,255,255,.3)}
.option-text{flex:1;border:none;background:transparent;color:var(--text-primary);font-family:var(--font-body);font-size:14px;outline:none;min-width:0}
.option-text:focus{color:#fff}
.option-text::placeholder{color:var(--text-tertiary)}
.option-x{width:26px;height:26px;border:none;background:transparent;color:var(--text-tertiary);cursor:pointer;border-radius:50%;font-size:16px;display:flex;align-items:center;justify-content:center;opacity:0;transition:all .15s}
.option-row:hover .option-x{opacity:1}
.option-x:hover{background:rgba(239,68,68,.12);color:var(--error)}
.add-btn{width:100%;padding:10px;margin-top:4px;border:1px dashed rgba(124,58,237,.2);background:rgba(124,58,237,.04);color:var(--brand-light);border-radius:10px;font-family:var(--font-body);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
.add-btn:hover{background:rgba(124,58,237,.1);border-color:rgba(124,58,237,.35)}

/* 底部工具栏 */
.sidebar-foot{padding:12px 20px;border-top:1px solid rgba(124,58,237,.12);display:flex;gap:8px}
.sidebar-foot button{flex:1;padding:10px;border-radius:10px;border:none;font-family:var(--font-body);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-reset{background:rgba(255,255,255,.04);color:var(--text-secondary)}
.btn-reset:hover{background:rgba(255,255,255,.08);color:var(--text-primary)}
.btn-preset{background:rgba(124,58,237,.1);color:var(--brand-light)}
.btn-preset:hover{background:rgba(124,58,237,.18)}

/* 主题色点 */
.theme-strip{display:flex;gap:8px;padding:12px 20px;overflow-x:auto;border-bottom:1px solid rgba(124,58,237,.06)}
.theme-dot{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .15s;flex-shrink:0}
.theme-dot:hover{transform:scale(1.2)}
.theme-dot.on{border-color:#fff;box-shadow:0 0 10px rgba(255,255,255,.25)}

/* 右侧主区域 */
.main-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden}
.main-bg{position:absolute;inset:0;pointer-events:none;background:radial-gradient(ellipse at 65% 50%,rgba(197,160,89,.04) 0%,rgba(124,58,237,.03) 40%,transparent 70%)}
.main-title{font-family:var(--font-display);font-size:28px;font-weight:900;text-align:center;background:linear-gradient(135deg,#F5C842,#FDE68A,#E5B83C);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px}
.main-sub{font-size:13px;color:var(--text-tertiary);text-align:center;margin-bottom:20px;font-family:var(--font-display)}
.wheel-wrap{width:min(380px,78vw);height:min(380px,78vw);position:relative;border-radius:50%;padding:10px;background:radial-gradient(circle at 45% 35%,#3D2A1A,#1A1008 50%,#0A0500);box-shadow:0 0 0 5px rgba(197,160,89,.15),0 0 100px rgba(197,160,89,.05),inset 0 2px 0 rgba(255,255,255,.02)}
.wheel-pointer{position:absolute;top:-16px;left:50%;transform:translateX(-50%);z-index:20;width:0;height:0;border-left:18px solid transparent;border-right:18px solid transparent;border-top:36px solid #F5C842;filter:drop-shadow(0 4px 8px rgba(0,0,0,.6))drop-shadow(0 0 16px rgba(245,200,66,.4));animation:ptrBounce .9s ease-in-out infinite}
.result-area{min-height:44px;margin-top:16px;text-align:center;font-family:var(--font-display);font-size:20px;font-weight:800;transition:all .3s var(--ease-bounce);color:var(--text-primary)}
.spin-btn{margin-top:10px;padding:18px 72px;border:none;border-radius:var(--radius-full);background:linear-gradient(180deg,#C9A44B,#A07828 50%,#7A5A1A);color:#1A0E00;font-family:var(--font-display);font-size:18px;font-weight:800;letter-spacing:.06em;cursor:pointer;box-shadow:0 6px 30px rgba(197,160,89,.3),inset 0 1px 0 rgba(255,255,255,.15);transition:all .15s var(--ease-out);min-height:58px;position:relative;overflow:hidden;-webkit-tap-highlight-color:transparent}
.spin-btn:active{transform:scale(.95)}
.spin-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.spin-btn .shine{position:absolute;top:-60%;left:-70%;width:60%;height:220%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.12),transparent);transform:skewX(-20deg);animation:btnShine 3.5s ease-in-out infinite}

/* 弹窗 */
.modal-overlay{position:fixed;inset:0;z-index:1000;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.78);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
.modal-overlay.show{display:flex}
.modal-card{background:linear-gradient(155deg,#1E1A2E,#12101E);border:1px solid rgba(245,200,66,.2);border-radius:28px;padding:40px 32px;text-align:center;max-width:360px;width:88vw;box-shadow:0 16px 64px rgba(0,0,0,.7),0 0 100px rgba(245,200,66,.08);transform:scale(.85);transition:transform .3s var(--ease-bounce)}
.modal-overlay.show .modal-card{transform:scale(1)}
.modal-icon{font-size:72px;margin-bottom:16px}
.modal-label{font-family:var(--font-display);font-size:14px;font-weight:600;color:var(--text-secondary);margin-bottom:4px}
.modal-prize{font-family:var(--font-display);font-size:28px;font-weight:900;margin-bottom:28px;background:linear-gradient(135deg,#F5C842,#FDE68A,#F59E0B);-webkit-background-clip:text;-webkit-text-fill-color:transparent}

@keyframes ptrBounce{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(7px)}}
@keyframes btnShine{0%{left:-70%}55%{left:130%}100%{left:130%}}
@media(max-width:768px){.layout{flex-direction:column-reverse}.sidebar{width:100%;max-height:40dvh}.wheel-wrap{width:min(280px,72vw);height:min(280px,72vw)}.spin-btn{padding:16px 56px;font-size:16px}}
</style>
</head>
<body>

<div class="layout">
  <div class="sidebar">
    <div class="sidebar-head">
      <div class="sidebar-title">选项列表</div>
      <div class="sidebar-desc" id="optCount">6 个选项</div>
    </div>
    <div class="theme-strip" id="themeStrip"></div>
    <div class="option-list" id="optionList"></div>
    <button class="add-btn" onclick="addOption()">+ 添加选项</button>
    <div class="sidebar-foot">
      <button class="btn-reset" onclick="usePreset('food')">🍜 吃什么</button>
      <button class="btn-preset" onclick="usePreset('drink')">🥤 喝什么</button>
    </div>
  </div>

  <div class="main-area">
    <div class="main-bg"></div>
    <div class="main-title" id="wheelTitle">今天吃什么</div>
    <div class="main-sub">点击转盘或按钮开始抽选</div>
    <div class="wheel-wrap" id="wheelWrap"><div class="wheel-pointer"></div></div>
    <div class="result-area" id="result"></div>
    <button class="spin-btn" id="spinBtn" onclick="doSpin()">开始抽选<div class="shine"></div></button>
  </div>
</div>

<div class="modal-overlay" id="winModal">
  <div class="modal-card">
    <div class="modal-icon" id="winIcon">🎉</div>
    <div class="modal-label">抽选结果</div>
    <div class="modal-prize" id="winText"></div>
    <button class="btn btn-primary" onclick="closeModal();doSpin()" style="width:100%;margin-bottom:8px;font-size:15px">再抽一次</button>
    <button class="btn btn-ghost" onclick="closeModal()" style="width:100%;font-size:13px">关闭</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/spin-wheel@5/dist/spin-wheel-iife.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1/dist/confetti.browser.min.js"></script>
<script src="runtime/effects/sound.js"></script>
<script src="runtime/effects/juice.js"></script>
<script src="runtime/effects/kenney-audio.js"></script>

<script>
var THEMES=[
  {name:'金橙',colors:['#E74C3C','#E67E22','#F1C40F','#2ECC71','#3498DB','#9B59B6','#E91E63','#00BCD4','#FF9800','#8BC34A','#FF5722','#673AB7']},
  {name:'暖色',colors:['#EF4444','#F97316','#F59E0B','#EAB308','#84CC16','#22C55E','#EC4899','#DC2626','#EA580C','#CA8A04','#A3E635','#D946EF']},
  {name:'冷色',colors:['#3B82F6','#6366F1','#8B5CF6','#A855F7','#06B6D4','#0EA5E9','#2563EB','#7C3AED','#4F46E5','#0891B2','#2DD4BF','#818CF8']},
  {name:'糖果',colors:['#F472B6','#FB923C','#FBBF24','#A3E635','#34D399','#22D3EE','#818CF8','#C084FC','#FB7185','#FDA4AF','#FDE68A','#A7F3D0']},
  {name:'暗金',colors:['#B8860B','#DAA520','#CD853F','#D2691E','#A0522D','#8B4513','#BDB76B','#808000','#6B8E23','#556B2F','#BC8F8F','#C5A35A']},
  {name:'霓虹',colors:['#FF0080','#7928CA','#00DFD8','#FF4D4D','#007CF0','#00FF88','#FFD700','#FF1493','#00BFFF','#7FFF00','#FF4500','#9400D3']},
];
var PRESETS={
  food:{title:'今天吃什么',options:['火锅','日料','烧烤','麻辣烫','汉堡','披萨','沙拉','拉面','早茶','饺子']},
  drink:{title:'喝什么',options:['奶茶','咖啡','可乐','果汁','啤酒','白开水','柠檬茶','奶昔']},
};
var _theme=0,_options=[],_wheel=null,_spinning=false;

(function init(){
  usePreset('food');
  buildThemeDots();
})();

function buildThemeDots(){
  var h='';
  for(var i=0;i<THEMES.length;i++)
    h+='<div class="theme-dot'+(i===_theme?' on':'')+'" style="background:'+THEMES[i].colors[0]+'" onclick="switchTheme('+i+')" title="'+THEMES[i].name+'"></div>';
  document.getElementById('themeStrip').innerHTML=h;
}

function switchTheme(i){_theme=i;buildThemeDots();assignColors();buildWheel();renderOptions();}
function assignColors(){for(var j=0;j<_options.length;j++)_options[j].color=THEMES[_theme].colors[j%THEMES[_theme].colors.length];}

function usePreset(key){
  var p=PRESETS[key];_options=p.options.map(function(o,i){return{title:o,color:THEMES[0].colors[i%THEMES[0].colors.length]};});
  _theme=0;assignColors();
  document.getElementById('wheelTitle').textContent=p.title;
  renderOptions();buildWheel();buildThemeDots();
}

function renderOptions(){
  var h='';
  for(var i=0;i<_options.length;i++){
    var o=_options[i];
    h+='<div class="option-row">'+
      '<input type="color" class="option-dot" value="'+o.color+'" onchange="updateColor('+i+',this.value)" title="颜色" style="background:'+o.color+'">'+
      '<input class="option-text" value="'+esc(o.title)+'" onchange="updateTitle('+i+',this.value)" placeholder="输入选项">'+
      '<button class="option-x" onclick="removeOption('+i+')">×</button></div>';
  }
  document.getElementById('optionList').innerHTML=h;
  document.getElementById('optCount').textContent=_options.length+' 个选项';
}

function addOption(){
  var c=THEMES[_theme].colors[_options.length%THEMES[_theme].colors.length];
  _options.push({title:'新选项',color:c});renderOptions();buildWheel();
}
function removeOption(i){if(_options.length<=2)return;_options.splice(i,1);renderOptions();buildWheel();}
function updateTitle(i,v){_options[i].title=v;}
function updateColor(i,v){_options[i].color=v;buildWheel();}

function buildWheel(){
  if(_wheel){_wheel.remove();_wheel=null;}
  var items=_options.map(function(o){return{label:o.title||'?',backgroundColor:o.color};});
  _wheel=new spinWheel.Wheel(document.getElementById('wheelWrap'),{
    items:items,radius:.78,itemLabelRadius:.65,itemLabelRadiusMax:.3,
    itemLabelFontSizeMax:12,itemLabelColors:['#fff'],itemLabelStrokeColor:'rgba(0,0,0,.5)',
    itemLabelStrokeWidth:1.5,lineColor:'rgba(255,255,255,.1)',lineWidth:2,
    rotationSpeedMax:550,rotationResistance:-45,
    onRest:onWin,onSpin:function(){_spinning=true},
  });
}

function doSpin(){
  if(!_wheel||_spinning)return;
  var b=document.getElementById('spinBtn');b.disabled=true;b.textContent='转动中...';
  document.getElementById('result').textContent='';
  SoundFX.play('click');Juice.vibrate('light');
  if(typeof KenneyAudio!=='undefined')KenneyAudio.play('diceShuffle');
  _wheel.spin();
}

function onWin(e){
  _spinning=false;
  var p=_options[e.currentIndex];if(!p)p={title:'?',color:'#7C3AED'};
  var b=document.getElementById('spinBtn');b.disabled=false;b.textContent='再来一次';
  if(typeof confetti!=='undefined')confetti({particleCount:100,spread:70,origin:{y:.5},colors:['#F5C842','#EC4899','#7C3AED','#22C55E'],disableForReducedMotion:true});
  if(typeof KenneyAudio!=='undefined'){KenneyAudio.play('chipsCollide');setTimeout(function(){KenneyAudio.play('diceThrow');},100);}else SoundFX.play('win');
  Juice.vibrate('medium');
  var r=document.getElementById('result');r.textContent='→ '+p.title;r.style.color=p.color;
  r.style.transform='scale(0)';r.style.opacity='0';
  requestAnimationFrame(function(){r.style.transform='scale(1)';r.style.opacity='1';});
  showModal(p);
}

function showModal(p){
  document.getElementById('winText').textContent=p.title;
  document.getElementById('winModal').classList.add('show');
}
function closeModal(){document.getElementById('winModal').classList.remove('show');}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
</script>
</body>
</html>
