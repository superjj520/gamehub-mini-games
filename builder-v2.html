<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GameHub · 创作工坊</title>
<link rel="stylesheet" href="design-system.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--gold:#F5C842;--bg:#0A0A1A;--accent:#7C3AED;--accent2:#EC4899;--deep:#12122A;--card:rgba(255,255,255,0.05);--border:rgba(255,255,255,0.08);--text:#E0DCF0;--muted:rgba(224,220,240,0.5);--green:#22C55E;--red:#EF4444;}
body{touch-action:manipulation;font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;}

/* 顶栏 */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 12px;height:44px;border-bottom:1px solid var(--border);background:var(--deep);z-index:100;flex-shrink:0;gap:8px;}
.topbar-left{display:flex;align-items:center;gap:8px;}
.topbar-logo{font-size:15px;font-weight:800;text-decoration:none;color:var(--text);cursor:pointer;}
.topbar-logo span{color:var(--gold);}
.topbar-sep{width:1px;height:18px;background:var(--border);}
.topbar-title{background:transparent;border:1px solid transparent;border-radius:4px;color:var(--text);font-size:14px;font-weight:600;padding:4px 8px;font-family:inherit;outline:none;width:180px;}
.topbar-title:hover,.topbar-title:focus{border-color:var(--border);}
.topbar-center{display:flex;align-items:center;gap:6px;}
.topbar-mode{display:flex;background:rgba(255,255,255,0.04);border-radius:6px;padding:2px;}
.topbar-mode-btn{padding:4px 12px;border:none;background:transparent;color:var(--muted);font-size:12px;cursor:pointer;border-radius:4px;font-family:inherit;transition:all 0.15s;}
.topbar-mode-btn.active{background:var(--accent);color:white;}
.topbar-right{display:flex;align-items:center;gap:6px;}
.topbar-status{font-size:10px;color:var(--muted);}
.topbar-dot{width:5px;height:5px;border-radius:50%;display:inline-block;margin-right:3px;}
.topbar-dot.saved{background:var(--green);}
.topbar-dot.unsaved{background:var(--gold);}

/* 主体 - 全屏地图 */
.main{flex:1;position:relative;min-height:0;}
#boardContainer{position:absolute;top:0;left:0;width:100%;height:100%;}
#previewFrame{position:absolute;inset:0;width:100%;height:100%;border:none;display:none;}

/* 底部内容管理器栏 */
.manager-bar{display:flex;align-items:center;justify-content:center;gap:2px;padding:4px 8px;border-top:1px solid var(--border);background:var(--deep);flex-shrink:0;z-index:100;}
.manager-item{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 14px;border:none;background:transparent;color:var(--muted);font-size:10px;cursor:pointer;border-radius:8px;font-family:inherit;transition:all 0.15s;min-width:56px;}
.manager-item:hover{background:rgba(255,255,255,0.04);color:var(--text);}
.manager-item.active{color:var(--accent);background:rgba(124,58,237,0.1);}
.manager-item .mi-icon{font-size:18px;line-height:1;}

/* 管理器面板（右侧滑入） */
.manager-panel{position:fixed;top:0;right:0;bottom:0;width:380px;max-width:90vw;background:var(--deep);border-left:1px solid var(--border);z-index:200;transform:translateX(100%);transition:transform 0.25s ease;display:flex;flex-direction:column;box-shadow:-4px 0 24px rgba(0,0,0,0.4);}
.manager-panel.open{transform:translateX(0);}
.manager-panel-header{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid var(--border);flex-shrink:0;}
.manager-panel-title{font-size:14px;font-weight:700;}
.manager-panel-close{width:28px;height:28px;border:none;background:rgba(255,255,255,0.06);color:var(--muted);border-radius:6px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;}
.manager-panel-close:hover{background:rgba(255,255,255,0.1);color:var(--text);}
.manager-panel-body{flex:1;overflow-y:auto;padding:14px;}

/* 面板通用组件 */
.mgr-section{margin-bottom:18px;}
.mgr-section-title{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;}
.mgr-item{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--card);border:1px solid var(--border);border-radius:8px;margin-bottom:4px;font-size:12px;cursor:pointer;transition:all 0.15s;}
.mgr-item:hover{border-color:rgba(124,58,237,0.3);background:rgba(124,58,237,0.05);}
.mgr-item.selected{border-color:var(--accent);}
.mgr-item-icon{font-size:16px;width:22px;text-align:center;flex-shrink:0;}
.mgr-item-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500;}
.mgr-item-del{width:22px;height:22px;border:none;background:rgba(239,68,68,0.1);color:var(--red);border-radius:4px;cursor:pointer;font-size:12px;display:none;align-items:center;justify-content:center;}
.mgr-item:hover .mgr-item-del{display:flex;}
.mgr-item-meta{font-size:10px;color:var(--muted);}

.mgr-add-btn{width:100%;padding:8px;border:1px dashed rgba(124,58,237,0.3);background:rgba(124,58,237,0.04);color:var(--accent);border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all 0.15s;}
.mgr-add-btn:hover{background:rgba(124,58,237,0.1);border-color:var(--accent);}

.mgr-field{margin-bottom:12px;}
.mgr-field label{display:block;font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px;}
.mgr-field input,.mgr-field select,.mgr-field textarea{width:100%;padding:8px 10px;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px;font-family:inherit;outline:none;}
.mgr-field input:focus,.mgr-field select:focus,.mgr-field textarea:focus{border-color:var(--accent);}
.mgr-field select option{background:var(--deep);color:var(--text);}
.mgr-field-row{display:flex;gap:8px;}
.mgr-field-row>*{flex:1;}

.btn{padding:7px 14px;border-radius:6px;border:none;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all 0.15s;display:inline-flex;align-items:center;gap:4px;}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:white;}
.btn-gold{background:linear-gradient(135deg,var(--gold),#F59E0B);color:#1A0A2E;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{color:var(--text);border-color:var(--text);}
.btn-danger{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);color:var(--red);}
.btn-sm{padding:4px 10px;font-size:11px;min-height:32px;}
.btn-icon{width:30px;height:30px;padding:0;border-radius:6px;font-size:14px;justify-content:center;}

/* Toast */
.toast{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);background:var(--deep);border:1px solid var(--gold);border-radius:10px;padding:10px 18px;font-size:12px;z-index:300;opacity:0;transition:opacity 0.2s;pointer-events:none;}
.toast.show{opacity:1;}

/* 遮罩 */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:150;display:none;}
.overlay.show{display:block;}

/* 响应式 */
@media(max-width:768px){
  .manager-panel{width:100%;max-width:100%;}
  .topbar-title{width:100px;}
  .manager-item{padding:6px 8px;min-width:40px;font-size:9px;}
  .manager-item .mi-icon{font-size:16px;}
}
</style>
</head>
<body>

<!-- 顶栏 -->
<div class="topbar">
  <div class="topbar-left">
    <a class="topbar-logo" href="index.html">🎮 <span>GameHub</span></a>
    <div class="topbar-sep"></div>
    <select id="gameType" onchange="switchGame()" style="background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:4px;color:var(--text);padding:4px 6px;font-size:12px;font-family:inherit;cursor:pointer;outline:none;">
      <option value="monopoly">🎰 大富翁</option><option value="snake">🐍 贪吃蛇</option><option value="wheel">🎡 大转盘</option><option value="quiz">🧠 答题</option><option value="game-2048">🔢 2048</option><option value="match3">💎 消消乐</option><option value="flying-chess">✈️ 飞行棋</option><option value="truth-or-dare">🤝 真心话</option>
<option value="scratch-card">💳 刮刮乐</option>
    </select>
    <input class="topbar-title" id="titleInput" value="未命名大富翁" onchange="onTitleChange()">
  </div>
  <div class="topbar-center">
    <div class="topbar-mode">
      <button class="topbar-mode-btn active" data-mode="edit" onclick="setMode('edit')">✏️ 编辑</button>
      <button class="topbar-mode-btn" data-mode="preview" onclick="setMode('preview')">👁️ 预览</button>
    </div>
  </div>
  <div class="topbar-right">
    <span class="topbar-status" id="saveStatus"><span class="topbar-dot saved"></span>就绪</span>
    <button class="btn btn-icon btn-outline" onclick="editorAPI.undo()" title="撤销 Ctrl+Z">↩</button>
    <button class="btn btn-icon btn-outline" onclick="editorAPI.redo()" title="重做 Ctrl+Y">↪</button>
    <button class="btn btn-outline btn-sm" onclick="saveConfig()">💾 保存</button>
    <button class="btn btn-primary btn-sm" onclick="publishConfig()">🚀 发布</button>
  </div>
</div>

<!-- 主区域 -->
<div class="main" id="mainArea">
  <div id="boardContainer"></div>
  <iframe id="previewFrame" sandbox="allow-scripts"></iframe>
</div>

<!-- 底部内容管理器 -->
<div class="manager-bar" id="managerBar">
  <button class="manager-item active" data-panel="board">
    <span class="mi-icon">🗺️</span>地图
  </button>
  <button class="manager-item" data-panel="collection">
    <span class="mi-icon">🎲</span>卡牌
  </button>
  <button class="manager-item" data-panel="rule">
    <span class="mi-icon">📐</span>规则
  </button>
  <button class="manager-item" data-panel="player">
    <span class="mi-icon">👥</span>玩家
  </button>
  <button class="manager-item" data-panel="store">
    <span class="mi-icon">🏪</span>商店
  </button>
  <button class="manager-item" data-panel="effect">
    <span class="mi-icon">⚡</span>事件
  </button>
  <button class="manager-item" data-panel="theme">
    <span class="mi-icon">🎨</span>主题
  </button>
</div>

<!-- 管理器面板 -->
<div class="manager-panel" id="managerPanel">
  <div class="manager-panel-header">
    <span class="manager-panel-title" id="panelTitle">编辑</span>
    <button class="manager-panel-close" onclick="closePanel()">×</button>
  </div>
  <div class="manager-panel-body" id="panelBody"></div>
</div>

<!-- 遮罩 -->
<div class="overlay" id="overlay" onclick="closePanel()"></div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="supabase.js"></script>
<script src="auth-player.js"></script>
<script src="runtime/block-registry.js?v=2"></script>
<script src="runtime/icons.js"></script>
<script src="runtime/core/theme.js?v=2"></script>
<script src="runtime/core/board-builder.js?v=3"></script>

<script>
// ==================== 编辑器核心 ====================
var editor = {
  gameType:'monopoly', title:'未命名大富翁', blocks:[], isDirty:false,
  configId:null, shareSlug:null, mode:'edit'
};
var editorAPI = null;  // BoardBuilder API
var _selectedCellId = null;
var _openPanel = null;

// ==================== 初始化 ====================
(function init(){
  editor.blocks = BlockRegistry.getDefaults('monopoly');
  document.getElementById('boardContainer').style.display = 'block';
  initMapEditor();
})();

function initMapEditor(){
  var block = findBlockByType('board');
  if(!block) return;
  var container = document.getElementById('boardContainer');
  if(editorAPI) editorAPI.destroy();
  editorAPI = BoardBuilder.create(container, block.config, {
    onSelect: function(cellId, cell){ _selectedCellId = cellId; },
    onChange: function(cfg){ updateBlockCfg('board', cfg); markDirty(); }
  });
}

// ==================== 模式切换 ====================
function setMode(mode){
  editor.mode = mode;
  document.querySelectorAll('.topbar-mode-btn').forEach(function(b){ b.classList.toggle('active', b.dataset.mode===mode); });
  if(mode === 'edit'){
    document.getElementById('boardContainer').style.display = 'block';
    document.getElementById('previewFrame').style.display = 'none';
    if(editorAPI) editorAPI.fitView();
  } else {
    document.getElementById('boardContainer').style.display = 'none';
    document.getElementById('previewFrame').style.display = 'block';
    renderPreview();
  }
}

// ==================== 管理器面板 ====================
document.getElementById('managerBar').addEventListener('click', function(e){
  var btn = e.target.closest('[data-panel]');
  if(!btn) return;
  document.querySelectorAll('.manager-item').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  openPanel(btn.dataset.panel);
});

function openPanel(panelId){
  _openPanel = panelId;
  var title = '', body = '';
  var block = findBlockByType(panelId==='board'?'board':panelId);

  switch(panelId){
    case 'board':
      title='🗺️ 地图'; body=renderBoardPanel(block); break;
    case 'collection':
      title='🎲 卡牌管理'; body=renderCollectionPanel(); break;
    case 'rule':
      title='📐 规则设置'; body=renderRulePanel(block); break;
    case 'player':
      title='👥 玩家设置'; body=renderPlayerPanel(block); break;
    case 'store':
      title='🏪 商店管理'; body=renderStorePanel(block); break;
    case 'effect':
      title='⚡ 事件管理'; body=renderEffectPanel(block); break;
    case 'theme':
      title='🎨 主题设置'; body=renderThemePanel(block); break;
  }

  document.getElementById('panelTitle').textContent = title;
  document.getElementById('panelBody').innerHTML = body;
  document.getElementById('managerPanel').classList.add('open');
  document.getElementById('overlay').classList.add('show');
}

function closePanel(){
  document.getElementById('managerPanel').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
  _openPanel = null;
  document.querySelectorAll('.manager-item').forEach(function(b){ b.classList.remove('active'); });
}

// ==================== 面板渲染 ====================
function renderBoardPanel(block){
  var cells = (block&&block.config.cells)||[];
  return '<div class="mgr-section"><div class="mgr-section-title">地图信息</div>'+
    '<div class="mgr-item"><span class="mgr-item-icon">📊</span><span class="mgr-item-name">格子总数</span><span class="mgr-item-meta">'+cells.length+' 格</span></div>'+
    '<div class="mgr-item"><span class="mgr-item-icon">🔗</span><span class="mgr-item-name">路径节点</span><span class="mgr-item-meta">'+((block&&block.config.pathOrder)||[]).length+' 个</span></div>'+
    '</div>'+
    '<div class="mgr-section"><div class="mgr-section-title">操作提示</div>'+
    '<div style="font-size:11px;color:var(--muted);line-height:1.8">'+
    '🖱️ 双击空白处添加格子<br>'+
    '🖱️ 拖拽移动格子<br>'+
    '🖱️ 右键格子打开菜单<br>'+
    '⌨️ Shift+点击多选<br>'+
    '⌨️ 方向键微调位置<br>'+
    '⌨️ Delete 删除选中格子<br>'+
    '⌨️ Ctrl+Z/Y 撤销重做<br>'+
    '⌨️ 空格+拖拽平移画布<br>'+
    '🖱️ 滚轮缩放<br>'+
    '</div></div>';
}

function renderCollectionPanel(){
  var html = '';
  var collections = findBlocksByType('collection');
  for(var i=0; i<collections.length; i++){
    var b = collections[i];
    var cards = (b.config&&b.config.cards)||[];
    html += '<div class="mgr-section"><div class="mgr-section-title">'+b.label+' ('+cards.length+'张)</div>';
    for(var j=0; j<cards.length; j++){
      var c = cards[j];
      html += '<div class="mgr-item" onclick="editCard(\''+b.id+'\','+j+')">'+
        '<span class="mgr-item-icon">🃏</span><span class="mgr-item-name">'+esc(c.title||'卡#'+j)+'</span>'+
        '<button class="mgr-item-del" onclick="event.stopPropagation();removeCard(\''+b.id+'\','+j+')">×</button></div>';
    }
    html += '<button class="mgr-add-btn" onclick="addCard(\''+b.id+'\')">+ 添加卡牌</button></div>';
  }
  return html || '<div style="color:var(--muted);font-size:12px;text-align:center;padding:20px">暂无卡牌Block<br>在地图编辑器中添加机会卡/命运卡</div>';
}

function renderRulePanel(block){
  var vars = (block&&block.config.variables)||[];
  var html = '';
  for(var i=0; i<vars.length; i++){
    var v = vars[i];
    html += '<div class="mgr-item" onclick="editVariable(\''+(block?block.id:'')+'\','+i+')">'+
      '<span class="mgr-item-icon">🔢</span><span class="mgr-item-name">'+esc(v.label)+'</span>'+
      '<span class="mgr-item-meta">'+v.value+'</span></div>';
  }
  return html || '<div style="color:var(--muted);font-size:12px;text-align:center;padding:20px">暂无规则</div>';
}

function renderPlayerPanel(block){
  var players = (block&&block.config.players)||[];
  var html = '<div class="mgr-section"><div class="mgr-section-title">玩家列表</div>';
  for(var i=0; i<players.length; i++){
    var p = players[i];
    html += '<div class="mgr-item" onclick="editPlayer(\''+(block?block.id:'')+'\','+i+')">'+
      '<span class="mgr-item-icon">'+(p.emoji||'🎮')+'</span><span class="mgr-item-name">'+esc(p.name)+'</span>'+
      (p.isAI?'<span class="mgr-item-meta">🤖 AI</span>':'')+
      '<span class="mgr-item-meta">💰'+(block&&block.config.initialGold)||1500+'</span></div>';
  }
  html += '</div>';
  if(block){
    html += '<div class="mgr-field"><label>初始金币</label><input type="number" value="'+(block.config.initialGold||1500)+'" onchange="updateBlockCfg(\'player\',{initialGold:parseInt(this.value)||1500});markDirty()"></div>';
    html += '<div class="mgr-field-row"><div class="mgr-field"><label>最少玩家</label><input type="number" value="'+(block.config.minPlayers||2)+'" onchange="updateBlockCfg(\'player\',{minPlayers:parseInt(this.value)||2})"></div><div class="mgr-field"><label>最多玩家</label><input type="number" value="'+(block.config.maxPlayers||4)+'" onchange="updateBlockCfg(\'player\',{maxPlayers:parseInt(this.value)||4})"></div></div>';
  }
  return html;
}

function renderStorePanel(block){
  var items = (block&&block.config.items)||[];
  var html = '';
  for(var i=0; i<items.length; i++){
    var it = items[i];
    html += '<div class="mgr-item">'+
      '<span class="mgr-item-icon">'+(it.icon||'📦')+'</span><span class="mgr-item-name">'+esc(it.name)+'</span>'+
      '<span class="mgr-item-meta">💰'+it.cost+'</span>'+
      '<button class="mgr-item-del" onclick="removeStoreItem(\''+(block?block.id:'')+'\','+i+')">×</button></div>';
  }
  html += '<button class="mgr-add-btn" onclick="addStoreItem(\''+(block?block.id:'')+'\')">+ 添加商品</button>';
  return html;
}

function renderEffectPanel(block){
  var effects = (block&&block.config.effects)||[];
  var html = '';
  for(var i=0; i<effects.length; i++){
    var ef = effects[i];
    html += '<div class="mgr-item">'+
      '<span class="mgr-item-icon">⚡</span><span class="mgr-item-name">'+esc(ef.trigger||'')+' → '+esc(ef.action||'')+'</span>'+
      '<span class="mgr-item-meta">'+(ef.value||'')+'</span></div>';
  }
  return html || '<div style="color:var(--muted);font-size:12px;text-align:center;padding:20px">暂无事件效果</div>';
}

function renderThemePanel(block){
  var cfg = (block&&block.config)||{};
  var presets = ['暗紫','暗金','暗绿','暗蓝','经典都市','赛博朋克','童话王国'];
  var html = '<div class="mgr-section"><div class="mgr-section-title">预设主题</div><div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px">';
  for(var i=0; i<presets.length; i++){
    html += '<button class="mgr-item" style="flex-direction:column;padding:10px 6px" onclick="updateBlockCfg(\'theme\',{preset:\''+presets[i]+'\'});markDirty();closePanel()"><span style="font-size:22px">🎨</span><span style="font-size:10px">'+presets[i]+'</span></button>';
  }
  html += '</div></div>';
  html += '<div class="mgr-field"><label>强调色</label><input type="color" value="'+(cfg.accent||'#7C3AED')+'" onchange="updateBlockCfg(\'theme\',{accent:this.value});markDirty()"></div>';
  html += '<div class="mgr-field"><label>辅助色</label><input type="color" value="'+(cfg.accent2||'#EC4899')+'" onchange="updateBlockCfg(\'theme\',{accent2:this.value});markDirty()"></div>';
  return html;
}

// ==================== 卡牌编辑弹窗 ====================
function editCard(blockId, idx){
  var block = findBlockById(blockId);
  if(!block) return;
  var card = (block.config.cards||[])[idx];
  if(!card) return;
  var html = '<div class="mgr-section"><div class="mgr-section-title">编辑卡牌</div>'+
    '<div class="mgr-field"><label>标题</label><input id="cardTitle" value="'+esc(card.title||'')+'"></div>'+
    '<div class="mgr-field-row"><div class="mgr-field"><label>权重</label><input id="cardWeight" type="number" value="'+(card.weight||1)+'"></div>'+
    '<div class="mgr-field"><label>金币效果</label><input id="cardGold" type="number" value="'+(card.effect&&card.effect.gold||0)+'"></div></div>'+
    '<div class="mgr-field-row"><div class="mgr-field"><label>移动效果</label><input id="cardMove" type="number" value="'+(card.effect&&card.effect.move||0)+'"></div>'+
    '<div class="mgr-field"><label>跳过回合</label><select id="cardSkip"><option value="0"'+(card.effect&&card.effect.skip?'':' selected')+'>否</option><option value="1"'+(card.effect&&card.effect.skip?' selected':'')+'>是</option></select></div></div>'+
    '<button class="btn btn-primary" onclick="saveCard(\''+blockId+'\','+idx+')" style="width:100%">💾 保存</button></div>';
  document.getElementById('panelBody').innerHTML = html;
}

// ==================== Block 操作 ====================
function findBlockByType(type){
  for(var i=0; i<editor.blocks.length; i++){
    if(editor.blocks[i].type===type) return editor.blocks[i];
  }
  return null;
}
function findBlocksByType(type){
  return editor.blocks.filter(function(b){return b.type===type;});
}
function findBlockById(id){
  for(var i=0; i<editor.blocks.length; i++){
    if(editor.blocks[i].id===id) return editor.blocks[i];
  }
  return null;
}
function updateBlockCfg(type, cfg){
  var block = findBlockByType(type);
  if(!block) return;
  for(var k in cfg){ if(cfg.hasOwnProperty(k)) block.config[k] = cfg[k]; }
  if(type==='board' && editorAPI){
    editorAPI.setConfig(block.config);
  }
}
// 特殊处理：卡牌增删
function addCard(blockId){
  var block = findBlockById(blockId);
  if(!block) return;
  if(!block.config.cards) block.config.cards = [];
  block.config.cards.push({title:'新卡牌',weight:1,effect:{}});
  markDirty();
  openPanel('collection');
}
function removeCard(blockId, idx){
  var block = findBlockById(blockId);
  if(!block) return;
  block.config.cards.splice(idx, 1);
  markDirty();
  openPanel('collection');
}
function saveCard(blockId, idx){
  var block = findBlockById(blockId);
  if(!block) return;
  var card = block.config.cards[idx];
  card.title = document.getElementById('cardTitle').value;
  card.weight = parseInt(document.getElementById('cardWeight').value)||1;
  if(!card.effect) card.effect = {};
  card.effect.gold = parseInt(document.getElementById('cardGold').value)||0;
  card.effect.move = parseInt(document.getElementById('cardMove').value)||0;
  card.effect.skip = document.getElementById('cardSkip').value === '1';
  markDirty();
  openPanel('collection');
}
function addStoreItem(blockId){
  var block = findBlockById(blockId);
  if(!block) return;
  if(!block.config.items) block.config.items = [];
  block.config.items.push({id:'item_'+Date.now().toString(36),name:'新商品',cost:100});
  markDirty();
  openPanel('store');
}
function removeStoreItem(blockId, idx){
  var block = findBlockById(blockId);
  if(!block) return;
  block.config.items.splice(idx,1);
  markDirty();
  openPanel('store');
}

// ==================== 预览 ====================
function renderPreview(){
  var iframe = document.getElementById('previewFrame');
  var cfg = {game_type:editor.gameType,title:editor.title,blocks:editor.blocks};
  var json = JSON.stringify(cfg).replace(/</g,'\\u003c');
  var html = '<!DOCTYPE html><html><head><meta charset="UTF-8"><style>'+
    '*{margin:0;padding:0;box-sizing:border-box}'+
    ':root{--gold:#F5C842;--bg:#0A0A1A;--accent:#7C3AED;--accent2:#EC4899;--deep:#12122A;--card:rgba(255,255,255,0.05);--border:rgba(255,255,255,0.08);--text:#E0DCF0;--muted:rgba(224,220,240,0.5)}'+
    'body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);display:flex;align-items:center;justify-content:center;min-height:100vh;padding:16px}'+
    '.pv-wrap{width:100%;max-width:500px}'+
    '.pv-board{position:relative;width:100%;min-height:300px;border-radius:8px;border:1px solid var(--border);background:rgba(0,0,0,0.2);overflow:hidden}'+
    '.pv-cell{position:absolute;min-width:50px;padding:3px 5px;border-radius:6px;border:1px solid rgba(255,255,255,0.1);font-size:8px;text-align:center;display:flex;flex-direction:column;align-items:center}'+
    '.pv-item{display:flex;align-items:center;gap:6px;padding:6px 8px;background:var(--card);border-radius:6px;margin-bottom:3px;font-size:10px}'+
    '</style></head><body><div class="pv-wrap">'+
    '<h2 style="font-size:15px;margin-bottom:8px">'+esc(editor.title)+'</h2>';

  var blocks = editor.blocks;
  for(var i=0; i<blocks.length; i++){
    var b = blocks[i];
    if(b.type==='board'){
      var cells = b.config.cells||[];
      html += '<div style="font-size:10px;color:var(--muted);margin:8px 0 4px">🗺️ '+b.label+' ('+cells.length+'格)</div>';
      html += '<div class="pv-board" style="position:relative;min-height:200px;max-height:280px">';
      var tC={start:'rgba(34,197,94,0.25)',property:'rgba(124,58,237,0.2)',chance:'rgba(245,200,66,0.2)',destiny:'rgba(236,72,153,0.2)',jail:'rgba(239,68,68,0.2)',shop:'rgba(59,130,246,0.2)',event:'rgba(34,211,238,0.2)',tax:'rgba(251,146,60,0.2)'};
      for(var j=0; j<Math.min(cells.length,24); j++){
        var c = cells[j];
        html += '<div class="pv-cell" style="left:'+(c.x*0.35)+'px;top:'+(c.y*0.35)+'px;background:'+(tC[c.type]||'var(--card)')+'">'+
          '<span style="font-size:14px">'+(c.icon||'')+'</span>'+(c.name||'')+'</div>';
      }
      html += '</div>';
    } else if(b.type==='collection'){
      var cards = b.config.cards||[];
      html += '<div style="font-size:10px;color:var(--muted);margin:8px 0 4px">🎲 '+b.label+' ('+cards.length+'张)</div>';
      for(var k=0; k<Math.min(cards.length,4); k++){
        html += '<div class="pv-item"><span>🃏</span><span>'+(cards[k].title||'卡#'+k)+'</span></div>';
      }
      if(cards.length>4) html += '<div style="font-size:9px;color:var(--muted)">... 还有'+(cards.length-4)+'张</div>';
    } else if(b.type==='player'){
      var players = b.config.players||[];
      html += '<div style="font-size:10px;color:var(--muted);margin:8px 0 4px">👥 '+players.length+'名玩家 初始💰'+(b.config.initialGold||1500)+'</div>';
    }
  }
  html += '</div></body></html>';
  var blob = new Blob([html],{type:'text/html'});
  if(iframe._prevUrl) URL.revokeObjectURL(iframe._prevUrl);
  iframe._prevUrl = URL.createObjectURL(blob);
  iframe.src = iframe._prevUrl;
}

// ==================== 保存/发布 ====================
function markDirty(){ editor.isDirty=true; updateSaveStatus(); }
function updateSaveStatus(){
  var el = document.getElementById('saveStatus');
  el.innerHTML = '<span class="topbar-dot '+(editor.isDirty?'unsaved':'saved')+'"></span>'+(editor.isDirty?'未保存':'就绪');
}
function onTitleChange(){ editor.title = document.getElementById('titleInput').value; markDirty(); }

async function saveConfig(){
  var player = GameSupabase.getCurrentPlayer();
  if(!player){ showToast('请先登录'); return; }
  var payload = {user_id:player.id,game_type:editor.gameType,title:editor.title,blocks:editor.blocks,is_public:false};
  var r;
  if(editor.configId){
    r = await GHSupabase.from('user_configs').update({...payload,updated_at:new Date().toISOString()}).eq('id',editor.configId).select('*').single();
  } else {
    r = await GHSupabase.from('user_configs').insert(payload).select('*').single();
  }
  if(r.error){ showToast('保存失败: '+r.error.message); return; }
  editor.configId = r.data.id; editor.isDirty = false; updateSaveStatus();
  showToast('✅ 已保存');
}

async function publishConfig(){
  if(!editor.configId) await saveConfig();
  if(!editor.configId) return;
  var slug = Math.random().toString(36).slice(2,10);
  var r = await GHSupabase.from('user_configs').update({is_published:true,share_slug:slug,updated_at:new Date().toISOString()}).eq('id',editor.configId);
  if(r.error){ showToast('发布失败: '+r.error.message); return; }
  editor.shareSlug = slug;
  var url = location.origin+'/play.html?config='+slug;
  showToast('🎉 已发布！链接已复制');
  navigator.clipboard && navigator.clipboard.writeText(url);
}

function switchGame(){
  if(editor.isDirty && !confirm('切换游戏类型将丢失未保存的修改。确定继续？')) return;
  editor.gameType = document.getElementById('gameType').value;
  editor.blocks = BlockRegistry.getDefaults(editor.gameType);
  editor.isDirty = false; editor.configId = null;
  updateSaveStatus();
  initMapEditor();
  closePanel();
}

// ==================== 工具 ====================
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function showToast(msg){
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2000);
}

// 键盘快捷键
document.addEventListener('keydown', function(e){
  if(e.ctrlKey && e.key==='s'){ e.preventDefault(); saveConfig(); }
});
