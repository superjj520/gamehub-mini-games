<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>GameHub · 小游戏中台</title>
<link rel="stylesheet" href="design-system.css">
<style>
body{min-height:100dvh;touch-action:manipulation}
a{text-decoration:none;color:inherit}

.nav{display:flex;align-items:center;justify-content:space-between;padding:var(--space-4) var(--space-6);border-bottom:1px solid var(--border-subtle);background:var(--surface-1);position:sticky;top:0;z-index:100;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.nav-logo{font-family:var(--font-display);font-size:22px;font-weight:900;letter-spacing:-.02em}
.nav-logo span{color:var(--gold)}
.nav-link{font-family:var(--font-display);font-size:13px;font-weight:600;color:var(--text-secondary);padding:8px 16px;border-radius:var(--radius-full);transition:all .15s;border:1px solid var(--border-default)}
.nav-link:hover{color:var(--text-primary);border-color:var(--border-strong);background:var(--surface-3)}

.hero{padding:var(--space-12) var(--space-6) var(--space-8);text-align:center}
.hero h1{font-family:var(--font-display);font-size:clamp(32px,6vw,56px);font-weight:900;letter-spacing:-.02em;margin-bottom:var(--space-3);background:linear-gradient(135deg,var(--gold),var(--gold-light),var(--brand-light));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero p{font-size:16px;color:var(--text-secondary);max-width:500px;margin:0 auto;font-family:var(--font-display)}

.container{max-width:1200px;margin:0 auto;padding:0 var(--space-5)}

.games-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:var(--space-3);padding:var(--space-4) 0 var(--space-12)}
.game-card{background:var(--surface-2);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);padding:var(--space-5);text-align:center;transition:all .2s var(--ease-out);cursor:pointer;display:block}
.game-card:hover{border-color:var(--border-accent);background:var(--surface-3);transform:translateY(-3px);box-shadow:var(--shadow-lg)}
.game-card .icon{font-size:40px;margin-bottom:var(--space-3);display:block}
.game-card .name{font-family:var(--font-display);font-size:15px;font-weight:700;margin-bottom:4px;color:var(--text-primary)}
.game-card .desc{font-size:11px;color:var(--text-tertiary);line-height:1.4}

.section-title{font-family:var(--font-display);font-size:20px;font-weight:800;margin-bottom:var(--space-3);padding-top:var(--space-8)}
.tools-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:var(--space-3);padding-bottom:var(--space-12)}
.tool-card{background:var(--surface-2);border:1px solid var(--border-default);border-radius:var(--radius-lg);padding:var(--space-5);display:flex;align-items:center;gap:var(--space-3);transition:all .2s;cursor:pointer}
.tool-card:hover{border-color:var(--brand);background:var(--surface-3)}
.tool-card .icon{font-size:28px}
.tool-card .name{font-family:var(--font-display);font-size:14px;font-weight:700}
.tool-card .desc{font-size:11px;color:var(--text-tertiary)}

.footer{padding:var(--space-8) var(--space-6);text-align:center;border-top:1px solid var(--border-subtle);font-size:12px;color:var(--text-tertiary);font-family:var(--font-display)}

@media(max-width:768px){
  .hero{padding:var(--space-8) var(--space-4)}
  .hero h1{font-size:28px}
  .games-grid{grid-template-columns:repeat(3,1fr);gap:8px}
  .game-card{padding:var(--space-3)}
  .game-card .icon{font-size:28px}
  .game-card .name{font-size:12px}
  .game-card .desc{display:none}
  .nav{padding:var(--space-3) var(--space-4)}
}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-logo">Game<span>Hub</span></div>
  <a class="nav-link" href="builder-v2.html">创作工坊</a>
</nav>

<section class="hero">
  <h1>创造即游玩</h1>
  <p>9 种游戏类型，自由配置内容，一键分享链接</p>
</section>

<div class="container">
  <div class="section-title">游戏</div>
  <div class="games-grid">
    <a class="game-card" href="wheel-page.html">
      <span class="icon">🎡</span>
      <div class="name">幸运转盘</div>
      <div class="desc">自定义选项，随机抽选</div>
    </a>
    <a class="game-card" href="play.html?game=monopoly">
      <span class="icon">🎰</span>
      <div class="name">大富翁</div>
      <div class="desc">棋盘竞技，地产买卖</div>
    </a>
    <a class="game-card" href="play.html?game=scratch-card">
      <span class="icon">💳</span>
      <div class="name">刮刮乐</div>
      <div class="desc">刮开涂层，揭晓奖品</div>
    </a>
    <a class="game-card" href="play.html?game=quiz">
      <span class="icon">🧠</span>
      <div class="name">答题</div>
      <div class="desc">题库抽选，即时反馈</div>
    </a>
    <a class="game-card" href="play.html?game=game-2048">
      <span class="icon">🔢</span>
      <div class="name">2048</div>
      <div class="desc">滑动合并，挑战高分</div>
    </a>
    <a class="game-card" href="play.html?game=snake">
      <span class="icon">🐍</span>
      <div class="name">贪吃蛇</div>
      <div class="desc">经典街机，越吃越长</div>
    </a>
    <a class="game-card" href="play.html?game=truth-or-dare">
      <span class="icon">🤝</span>
      <div class="name">真心话大冒险</div>
      <div class="desc">卡牌抽取，聚会必备</div>
    </a>
    <a class="game-card" href="play.html?game=flying-chess">
      <span class="icon">✈️</span>
      <div class="name">飞行棋</div>
      <div class="desc">掷骰前进，四人竞技</div>
    </a>
    <a class="game-card" href="play.html?game=match3">
      <span class="icon">💎</span>
      <div class="name">消消乐</div>
      <div class="desc">三连消除，闯关得分</div>
    </a>
  </div>
</div>

<footer class="footer">GameHub · 创造即游玩</footer>

</body>
</html>
