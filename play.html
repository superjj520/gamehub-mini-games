<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="pageTitle">GameHub · 大富翁</title>
<link rel="stylesheet" href="design-system.css">
<style>
body { touch-action:manipulation; min-height:100dvh; display:flex; flex-direction:column; overflow:hidden; }
a { color: var(--brand-light); text-decoration: none; }

/* 顶栏 */
.topbar {
  display:flex; align-items:center; justify-content:space-between;
  padding:0 var(--space-5); height:52px; border-bottom:1px solid var(--border-subtle);
  background: var(--surface-1); flex-shrink:0; z-index:100;
}
.topbar-left { display:flex; align-items:center; gap: var(--space-3); }
.topbar-logo { font-family: var(--font-display); font-size:18px; font-weight:800; color: var(--text-primary); }
.topbar-logo span { color: var(--gold); }
.topbar-title { font-family: var(--font-display); font-size:15px; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.topbar-badge { font-size:11px; padding:2px 10px; border-radius: var(--radius-full); background: rgba(124,58,237,0.15); color: var(--brand-light); flex-shrink:0; }

/* 游戏区 */
.game-area { flex:1; display:flex; min-height:0; overflow:hidden; }
.game-board { flex:1; padding: var(--space-5); display:flex; align-items:center; justify-content:center; overflow:auto; }
.game-board-inner { width:100%; max-width:580px; }

/* 侧面板 */
.game-panel {
  width:300px; border-left:1px solid var(--border-subtle);
  padding: var(--space-4); overflow-y:auto; background: var(--surface-1);
  display:flex; flex-direction:column; gap: var(--space-4); flex-shrink:0;
}
.panel-label { font-size:10px; font-weight:700; color: var(--text-tertiary); text-transform:uppercase; letter-spacing:0.08em; margin-bottom: var(--space-2); }

.player-card {
  background: var(--surface-2); border:1px solid var(--border-subtle); border-radius: var(--radius-md);
  padding: var(--space-3) var(--space-4); margin-bottom: var(--space-2);
  transition: all var(--duration-normal);
}
.player-card.active { border-color: var(--gold); box-shadow:0 0 12px rgba(245,200,66,0.12); background: var(--surface-3); }
.player-card-header { display:flex; align-items:center; gap: var(--space-2); margin-bottom:2px; }
.player-emoji { font-size:22px; }
.player-name { font-size:13px; font-weight:700; font-family: var(--font-display); flex:1; }
.player-ai-badge { font-size:10px; color: var(--text-tertiary); }
.player-stats { font-size:11px; color: var(--text-secondary); display:flex; gap: var(--space-3); flex-wrap:wrap; }

.btn {
  display:inline-flex; align-items:center; justify-content:center; gap:6px;
  padding:12px 20px; border-radius: var(--radius-md); border:none;
  font-family: var(--font-body); font-size:14px; font-weight:700; cursor:pointer;
  transition: all var(--duration-fast) var(--ease-out); width:100%; min-height:44px;
  -webkit-tap-highlight-color:transparent;
}
.btn:active { transform:scale(0.97); }
.btn:disabled { opacity:0.4; cursor:not-allowed; transform:none; }
.btn-primary { background:linear-gradient(135deg,var(--brand),#A855F7); color:#fff; box-shadow:0 2px 8px rgba(124,58,237,0.25); }
.btn-primary:hover:not(:disabled) { box-shadow:0 4px 16px rgba(124,58,237,0.4); transform:translateY(-1px); }
.btn-secondary { background:var(--surface-3); border:1px solid var(--border-default); color:var(--text-primary); margin-top:var(--space-1); }
.btn-secondary:hover:not(:disabled) { border-color:var(--border-strong); background:var(--surface-4); }
.btn-danger { background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.2); color:var(--error); margin-top:var(--space-1); }

.status-bar {
  padding:var(--space-3) var(--space-5); border-top:1px solid var(--border-subtle);
  background:var(--surface-1); font-size:13px; color:var(--text-secondary);
  text-align:center; flex-shrink:0; min-height:44px; font-family:var(--font-display);
}

/* 加载 */
.loading {
  display:flex; align-items:center; justify-content:center;
  height:100dvh; flex-direction:column; gap:var(--space-4);
  background:var(--surface-0);
}
.loading-spinner {
  width:48px; height:48px; border:3px solid var(--border-default);
  border-top-color:var(--brand); border-radius:50%;
  animation:spin 0.8s linear infinite;
}
.loading-text { font-size:14px; color:var(--text-tertiary); font-family:var(--font-display); }
@keyframes spin { to{transform:rotate(360deg);} }
@keyframes pointerBounce { 0%,100%{transform:translateX(-50%) translateY(0)} 50%{transform:translateX(-50%) translateY(4px)} }

/* 游戏切换栏 */
.game-switcher {
  display:flex; gap:2px; padding:var(--space-2) var(--space-3);
  background:var(--surface-1); border-top:1px solid var(--border-subtle);
  overflow-x:auto; flex-shrink:0; z-index:90;
}
.game-switcher button {
  flex-shrink:0; padding:8px 14px; border:none; border-radius:var(--radius-full);
  font-family:var(--font-body); font-size:12px; font-weight:600; cursor:pointer;
  background:transparent; color:var(--text-secondary);
  transition:all var(--duration-fast) var(--ease-out); min-height:36px;
}
.game-switcher button:hover { background:var(--surface-3); color:var(--text-primary); }
.game-switcher button.active { background:var(--brand); color:#fff; box-shadow:0 2px 8px rgba(124,58,237,0.3); }

@media(max-width:768px) {
  .game-area { flex-direction:column; }
  .game-panel { width:100%; border-left:none; border-top:1px solid var(--border-subtle); max-height:38dvh; flex-shrink:0; }
  .game-board { min-height:38dvh; }
}
@media(prefers-reduced-motion:reduce) { *,*::before,*::after{animation-duration:0.01ms!important;transition-duration:0.01ms!important;} }
</style>
</head>
<body>

<div id="loading" class="loading">
  <div class="loading-spinner"></div>
  <div class="loading-text">加载游戏配置中</div>
</div>

<div id="app" style="display:none;flex-direction:column;min-height:100dvh">
  <div class="topbar">
    <div class="topbar-title" id="gameTitle">GameHub</div>
    <div class="topbar-badge" id="gameType">大富翁</div>
  </div>
  <div class="game-area">
    <div class="game-board">
      <div class="game-board-inner" id="boardContainer"></div>
    </div>
    <div class="game-panel" id="sidePanel">
      <div class="panel-section">
        <div class="panel-label">玩家</div>
        <div id="playerList"></div>
      </div>
      <div class="panel-section" id="btnSection">
        <button class="btn btn-primary" id="btnRoll" onclick="MonopolyGame.rollDice()">掷骰子</button>
        <button class="btn btn-secondary" id="btnBuy" onclick="MonopolyGame.buyProperty()">购买地产</button>
      </div>
      <div class="panel-section">
        <div class="panel-label">最近事件</div>
        <div id="eventLog" style="font-size:11px;color:var(--text-tertiary);line-height:1.8;"></div>
      </div>
    </div>
  </div>
  <div class="status-bar" id="statusBar">准备开始</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/spin-wheel@5/dist/spin-wheel-iife.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="runtime/effects/particles.js"></script>
<script src="runtime/effects/sound.js"></script>
<script src="runtime/effects/juice.js"></script>
<script src="supabase.js"></script>
<script src="runtime/block-registry.js"></script>
<script src="runtime/core/theme.js"></script>
<script src="runtime/core/rule.js"></script>
<script src="runtime/core/collection.js"></script>
<script src="runtime/core/grid.js"></script>
<script src="runtime/core/effect.js"></script>
<script src="runtime/core/player.js"></script>
<script src="runtime/core/store.js"></script>
<script src="runtime/core/building.js"></script>
<script src="runtime/core/piece.js"></script>
<script src="runtime/engine.js"></script>
<script src="runtime/games/monopoly.js"></script>
<script src="runtime/games/snake.js"></script>
<script src="runtime/games/wheel.js"></script>
<script src="runtime/games/quiz.js"></script>
<script src="runtime/games/game2048.js"></script>
<script src="runtime/games/match3.js"></script>
<script src="runtime/games/flying-chess.js"></script>
<script src="runtime/games/truth-or-dare.js"></script>
<script src="runtime/games/scratch-card.js"></script>
<script src="invite.js"></script>

<script>
var GAME_MAP = {
  'monopoly':      { name: '大富翁',     module: MonopolyGame },
  'snake':         { name: '贪吃蛇',     module: SnakeGame },
  'wheel':         { name: '大转盘',     module: WheelGame },
  'quiz':          { name: '答题',       module: QuizGame },
  'game-2048':     { name: '2048',       module: Game2048 },
  'match3':        { name: '消消乐',     module: Match3Game },
  'flying-chess':  { name: '飞行棋',     module: FlyingChessGame },
  'truth-or-dare': { name: '真心话大冒险', module: TruthOrDareGame },
  'scratch-card':   { name: '刮刮乐',       module: ScratchCardGame },
};

(async function main() {
  var params = new URLSearchParams(location.search);
  var slug = params.get('config');
  var configId = params.get('cid');

  if (!slug && !configId) {
    var gameType = params.get('game') || 'monopoly';
    var gameInfo = GAME_MAP[gameType] || GAME_MAP['monopoly'];
    document.getElementById('pageTitle').textContent = 'GameHub · ' + gameInfo.name;
    var config = {
      id: 'default', game_type: gameType,
      title: gameInfo.name + '（默认配置）',
      blocks: BlockRegistry.getDefaults(gameType),
    };
    addGameSwitcher(gameType);
    startGame(config);
    return;
  }

  try {
    var query = GHSupabase.from('user_configs').select('*');
    if (slug) query = query.eq('share_slug', slug);
    else query = query.eq('id', configId);
    var result = await query.single();
    if (result.error) throw result.error;
    var config = result.data;
    GHSupabase.from('user_configs').update({ plays_count: (config.plays_count||0)+1 }).eq('id',config.id).then(function(){}).catch(function(){});
    startGame(config);
  } catch(e) {
    document.getElementById('loading').innerHTML = '<div style="font-size:40px;margin-bottom:8px">!</div><div class="loading-text">加载失败: '+e.message+'</div>';
  }
})();

function startGame(config) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('app').style.display = 'flex';

  var gameInfo = GAME_MAP[config.game_type] || { name: config.game_type, module: null };
  document.getElementById('gameTitle').textContent = config.title || gameInfo.name;
  document.getElementById('gameType').textContent = gameInfo.name;

  if (!gameInfo.module) { document.getElementById('statusBar').textContent = '不支持: '+config.game_type; return; }
  document.getElementById('statusBar').textContent = '游戏初始化中';

  GameEngine.on('game:state', function(gs){ renderGenericState(config.game_type, gs); });
  GameEngine.on('game:status', function(msg){ document.getElementById('statusBar').textContent = msg; });
  GameEngine.on('monopoly:state', function(gs){ renderMonopolyState(gs); });
  GameEngine.on('monopoly:status', function(msg){ document.getElementById('statusBar').textContent = msg; });

  var container = document.getElementById('boardContainer');
  if (config.game_type==='wheel'||config.game_type==='truth-or-dare') {
    container.style.maxWidth='100%'; container.style.display='flex'; container.style.flexDirection='column'; container.style.alignItems='center';
  }

  GameEngine.init(config, container, gameInfo.module).catch(function(e){ document.getElementById('statusBar').textContent='启动失败: '+e.message; });

  var btnSection = document.getElementById('btnSection');
  if (config.game_type==='monopoly')
    btnSection.innerHTML = '<button class="btn btn-primary" id="btnRoll" onclick="MonopolyGame.rollDice()">掷骰子</button><button class="btn btn-secondary" id="btnBuy" onclick="MonopolyGame.buyProperty()">购买地产</button>';
  else if (config.game_type==='flying-chess')
    btnSection.innerHTML = '<button class="btn btn-primary" onclick="FlyingChessGame.rollDice()">掷骰子</button>';
  else if (config.game_type==='wheel')
    btnSection.innerHTML = '<button class="btn btn-primary" id="spinBtn" onclick="WheelGame.spin()">开始抽奖</button>';
  else if (config.game_type==='truth-or-dare')
    btnSection.innerHTML = '<button class="btn btn-primary" onclick="TruthOrDareGame.pickTruth()" style="margin-bottom:4px">真心话</button><button class="btn btn-secondary" onclick="TruthOrDareGame.pickDare()" style="margin-bottom:4px">大冒险</button><button class="btn btn-danger" onclick="TruthOrDareGame.skip()">跳过</button>';
  else
    btnSection.innerHTML = '<div style="font-size:12px;color:var(--text-tertiary);text-align:center">键盘 / 触屏操作</div>';
}

function renderGenericState(gameType, gs) {
  if (gs.score !== undefined)
    document.getElementById('playerList').innerHTML = '<div class="player-card"><div class="player-card-header"><span style="font-size:20px">&#127942;</span><span class="player-name">得分</span></div><div class="player-stats"><span style="font-size:24px;font-weight:800">'+gs.score+'</span></div></div>';
  if (gs.gameOver) document.getElementById('btnRoll').disabled = true;
}

function renderMonopolyState(gameState) {
  var html = '', players = gameState.players || [];
  for (var i=0;i<players.length;i++) {
    var p = players[i], ac = (i===gameState.currentPlayer&&!gameState.gameOver)?' active':'';
    html += '<div class="player-card'+ac+'"><div class="player-card-header"><span class="player-emoji">'+p.emoji+'</span><span class="player-name">'+p.name+'</span>';
    if (p.isAI) html += '<span class="player-ai-badge">AI</span>';
    html += '</div><div class="player-stats"><span>'+p.gold+'</span><span>#'+(p.position+1)+'</span><span>'+p.laps+'圈</span>';
    if (p.properties&&p.properties.length>0) html += '<span> x'+p.properties.length+'</span>';
    html += '</div></div>';
  }
  document.getElementById('playerList').innerHTML = html;
  document.getElementById('btnRoll').disabled = gameState.gameOver;
  var logHtml = '', log = gameState.log || [];
  for (var j=0;j<log.length;j++) logHtml += '<div>'+log[j]+'</div>';
  document.getElementById('eventLog').innerHTML = logHtml || '<div style="opacity:0.5">游戏即将开始</div>';
}

function addGameSwitcher(currentGame) {
  var games = [
    {key:'monopoly',name:'大富翁',icon:'&#127920;'},{key:'wheel',name:'大转盘',icon:'&#127922;'},
    {key:'scratch-card',name:'刮刮乐',icon:'&#127923;'},{key:'quiz',name:'答题',icon:'&#129504;'},
    {key:'game-2048',name:'2048',icon:'&#128290;'},{key:'snake',name:'贪吃蛇',icon:'&#128013;'},
    {key:'truth-or-dare',name:'真心话',icon:'&#129309;'},{key:'flying-chess',name:'飞行棋',icon:'&#9992;'},
    {key:'match3',name:'消消乐',icon:'&#128142;'},
  ];
  var bar = document.createElement('div');
  bar.className = 'game-switcher';
  for (var i=0;i<games.length;i++){
    (function(g){
      var btn = document.createElement('button');
      btn.innerHTML = g.icon + ' ' + g.name;
      if (g.key===currentGame) btn.classList.add('active');
      btn.addEventListener('click',function(){ location.href='?game='+g.key; });
      bar.appendChild(btn);
    })(games[i]);
  }
  document.getElementById('app').appendChild(bar);
}
</script>
</body>
</html>
